name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    env:
      # Giá trị giả, chỉ để build qua được bước validate env.
      # KHÔNG phải secret thật — Supabase local/cloud không được gọi ở job này.
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role
      CRON_SECRET: ci-placeholder-cron-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  database:
    name: Migration · Seed · RLS tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      # `db reset` chạy lại TOÀN BỘ migration từ đầu + seed.
      # Migration nào chỉ chạy được trên DB đã có sẵn dữ liệu sẽ chết ở đây —
      # đúng như mong muốn.
      - name: Reset DB (migration + seed)
        run: npm run db:reset

      - name: pgTAP (constraint + RLS + IDOR)
        run: supabase test db
